version: 2
updates:
  # Keep GitHub Actions runners and action versions current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"

  # Keep Python dependencies current. PoC is stdlib-only, but pip is used in
  # CI for ruff, jsonschema, and (from MVP) cryptography/Pillow/NumPy.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "python"
    # Security updates are always opened regardless of the weekly schedule.
    open-pull-requests-limit: 10
