name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege: CI only needs to read the repository.
permissions:
  contents: read

# Cancel any in-flight run for the same branch/PR when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile check (stdlib lint)
        run: python -m py_compile src/provenance.py

      - name: Ruff lint
        run: |
          python -m pip install --quiet ruff
          ruff check src/

      - name: Validate manifest schema (draft 2020-12)
        run: |
          python -m pip install --quiet jsonschema
          python - <<'PY'
          import json
          from jsonschema.validators import Draft202012Validator

          with open("schemas/manifest.schema.json", encoding="utf-8") as f:
              schema = json.load(f)
          Draft202012Validator.check_schema(schema)
          print("schema OK: draft 2020-12 valid")
          PY

      - name: Smoke test — register + verify round trip
        run: |
          git config user.name "ci"
          git config user.email "ci@example.invalid"
          printf 'apv ci smoke asset' > sample.bin
          python src/provenance.py register sample.bin --license CC0-1.0 --method human
          python src/provenance.py verify sample.bin
          printf 'tampered' >> sample.bin
          if python src/provenance.py verify sample.bin; then
            echo "verify should have failed on tampered file" >&2
            exit 1
          fi
          echo "smoke test OK"

      - name: Smoke test — anchor + verify-chain
        run: |
          python src/provenance.py anchor
          python src/provenance.py verify-chain
          echo "anchor + verify-chain OK"

      - name: Install pytest and run test suite
        run: |
          python -m pip install --quiet pytest
          python -m pytest tests/ -q
          echo "pytest OK"
